---
layout: default
title: Writing
---

<ul class="writing-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url }}">{{ post.title }}{% if post.subtitle %} <em>— {{ post.subtitle }}</em>{% endif %}</a>
    <div class="post-date">{{ post.date | date: "%B %Y" }}</div>
  </li>
  {% endfor %}
</ul>
