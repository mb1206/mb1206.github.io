---
layout: default
---

<article>
  <header class="post-header">
    <h1>{{ page.title }}{% if page.subtitle %}<br><em>{{ page.subtitle }}</em>{% endif %}</h1>
    <div class="post-meta">{{ page.date | date: "%B %Y" }}</div>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
